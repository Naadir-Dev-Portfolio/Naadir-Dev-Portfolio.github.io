name: Compile Portfolio Data

on:
  # Run automatically every night at 02:00 UTC
  schedule:
    - cron: '0 2 * * *'

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  compile:
    name: Fetch & compile project cards
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit data.js back to the repo

    steps:
      - name: Checkout portfolio repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run compile script
        env:
          PORTFOLIO_TOKEN: ${{ secrets.PORTFOLIO_TOKEN }}
        run: python scripts/compile_projects.py

      - name: Commit updated data.js (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/js/data.js
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to data.js — nothing to commit."
          else
            git commit -m "chore: recompile portfolio data [skip ci]"
            git push
          fi
